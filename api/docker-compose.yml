name: cobracerta

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cobracerta
      POSTGRES_PASSWORD: cobracerta
      POSTGRES_DB: cobracerta
    ports:
      - "5433:5432"
    volumes:
      - cobracerta_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - cobracerta_redis_data:/data

  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://cobracerta:cobracerta@postgres:5432/cobracerta?schema=evolution_api
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_LOCAL_ENABLED: "false"
    volumes:
      - cobracerta_evolution_instances:/evolution/instances
    # Manager (UI para escanear QR Code / gerenciar instâncias) já vem embutido
    # em http://localhost:8080/manager — não precisa de container separado.

volumes:
  cobracerta_postgres_data:
  cobracerta_redis_data:
  cobracerta_evolution_instances:
