name: cobracerta-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cobracerta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?informe POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cobracerta}
    volumes:
      - cobracerta_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cobracerta}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?informe REDIS_PASSWORD}"]
    volumes:
      - cobracerta_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:?informe EVOLUTION_SERVER_URL}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:?informe EVOLUTION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-cobracerta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cobracerta}?schema=evolution_api
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/6
      CACHE_LOCAL_ENABLED: "false"
    volumes:
      - cobracerta_evolution_instances:/evolution/instances
    ports:
      - "8080:8080"
    # Manager (UI para escanear QR Code / gerenciar instâncias) embutido em /manager.

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-cobracerta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cobracerta}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://api.asaas.com/v3}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-cobracerta}
      GMAIL_USUARIO: ${GMAIL_USUARIO}
      GMAIL_SENHA_APP: ${GMAIL_SENHA_APP}
      GMAIL_REMETENTE: ${GMAIL_REMETENTE}
      COBRANCA_ANTECEDENCIA_DIAS: ${COBRANCA_ANTECEDENCIA_DIAS:-5}
      CONFIRMACAO_PAGAMENTO_HABILITADA: ${CONFIRMACAO_PAGAMENTO_HABILITADA:-false}
      JWT_SECRET: ${JWT_SECRET:?informe JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:?informe CONFIG_ENCRYPTION_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ALERTA_OPERACIONAL_DESTINO: ${ALERTA_OPERACIONAL_DESTINO}
      ALERTA_GMAIL_USUARIO: ${ALERTA_GMAIL_USUARIO}
      ALERTA_GMAIL_SENHA_APP: ${ALERTA_GMAIL_SENHA_APP}
      ALERTA_GMAIL_REMETENTE: ${ALERTA_GMAIL_REMETENTE}
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.front
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_URL: http://api:3000
    ports:
      - "3001:3001"

volumes:
  cobracerta_postgres_data:
  cobracerta_redis_data:
  cobracerta_evolution_instances:
